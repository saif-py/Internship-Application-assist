name: Internship Assistant Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * *"

jobs:
  run-internship-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r internship_bot/requirements.txt

      - name: Prepare runtime configs
        shell: bash
        run: |
          cp internship_bot/config/profile.yaml internship_bot/config/profile.runtime.yaml
          cp internship_bot/config/sources.yaml internship_bot/config/sources.runtime.yaml

      - name: Override profile config from secret
        shell: bash
        env:
          CANDIDATE_PROFILE_YAML: ${{ secrets.CANDIDATE_PROFILE_YAML }}
        run: |
          if [ -n "$CANDIDATE_PROFILE_YAML" ]; then
            printf '%s\n' "$CANDIDATE_PROFILE_YAML" > internship_bot/config/profile.runtime.yaml
          fi

      - name: Override sources config from secret
        shell: bash
        env:
          JOB_SOURCES_YAML: ${{ secrets.JOB_SOURCES_YAML }}
        run: |
          if [ -n "$JOB_SOURCES_YAML" ]; then
            printf '%s\n' "$JOB_SOURCES_YAML" > internship_bot/config/sources.runtime.yaml
          fi

      - name: Run internship assistant
        env:
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
          SHEETS_WEBHOOK_TOKEN: ${{ secrets.SHEETS_WEBHOOK_TOKEN }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
        run: |
          python internship_bot/run.py \
            --profile internship_bot/config/profile.runtime.yaml \
            --sources internship_bot/config/sources.runtime.yaml \
            --max-listings 150

      - name: Upload tailored resume artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tailored-resumes
          path: internship_bot/generated_resumes/
          if-no-files-found: ignore
